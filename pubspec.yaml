name: fluttersdk_dusk
description: "Flutter E2E driver for LLM agents and CI. 32 CLI commands and 31 MCP tools drive a running app over VM Service extensions; no flutter_test harness needed."
version: 0.0.5
homepage: https://fluttersdk.com/dusk
repository: https://github.com/fluttersdk/dusk
issue_tracker: https://github.com/fluttersdk/dusk/issues
documentation: https://fluttersdk.com/dusk

# pub.dev search topics (max 5, lowercase + hyphens, regex ^[a-z][a-z0-9-]{0,31}$).
# Order = priority. `mcp-server` + `e2e-testing` are near-empty pub.dev topic
# spaces dusk can rank #1 on immediately; `ai-agents` is forward-looking with
# no current claimant; `testing` is the canonical broad-reach term; `flutter`
# is the high-traffic exact-match anchor.
topics:
  - mcp-server
  - e2e-testing
  - ai-agents
  - testing
  - flutter

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  fluttersdk_artisan: ^0.0.6
  image: ^4.0.0
  meta: ^1.16.0
  fluttersdk_wind_diagnostics_contracts: ^1.0.0

executables:
  # `dart run fluttersdk_dusk <cmd>` is the dusk-flavoured artisan wrapper.
  # Surfaces 32 CLI commands + 31 MCP tools (28 ext.dusk.* + 3 artisan:dusk:*) via DuskArtisanProvider.
  fluttersdk_dusk: fluttersdk_dusk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
  yaml: ^3.1.0
