name: fluttersdk_dusk
description: "E2E driver for Flutter apps. Snapshot, tap, type, drag, scroll, screenshot, wait, find via VM Service extensions (ext.dusk.*). Framework-agnostic (vanilla Flutter friendly); Magic/Wind integrations ship inside those packages via DuskPlugin.enrichers extension point."
version: 1.0.0-alpha.1
homepage: https://dusk.fluttersdk.com
repository: https://github.com/fluttersdk/dusk

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  fluttersdk_artisan:
    path: ../fluttersdk_artisan
  meta: ^1.16.0
  image: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
publish_to: none
