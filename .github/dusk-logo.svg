<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- FlutterSDK Dusk - Twilight Violet (#6D28D9) with twilight haze shimmer -->

    <!-- Layer 1 - Core (Twilight Primary) -->
    <linearGradient id="d1-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="d1-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <!-- Layer 2 (Twilight Glow) -->
    <linearGradient id="d2-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="d2-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Layer 3 (Twilight Deep - violet to indigo bridge) -->
    <linearGradient id="d3-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="d3-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>

    <!-- Layer 4 - Outer (Night Sky Indigo) -->
    <linearGradient id="d4-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="d4-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>

    <!-- Twilight haze shimmer gradient -->
    <linearGradient id="dusk-shimmer-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="20%" stop-color="#A78BFA" stop-opacity="1"/>
      <stop offset="80%" stop-color="#818CF8" stop-opacity="1"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dusk-shimmer-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0"/>
      <stop offset="15%" stop-color="#818CF8" stop-opacity="0.9"/>
      <stop offset="85%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dusk-shimmer-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="25%" stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 3D stars with light top / dark bottom faces -->

  <!-- Layer 4 - Outer (Night Sky Indigo) -->
  <path d="M280 56 L456 232 L280 320 L368 232 L280 144 Z" fill="url(#d4-light)"/>
  <path d="M280 320 L456 232 L280 408 Z" fill="url(#d4-dark)"/>

  <!-- Layer 3 (Twilight Deep) -->
  <path d="M216 88 L392 264 L216 352 L304 264 L216 176 Z" fill="url(#d3-light)"/>
  <path d="M216 352 L392 264 L216 440 Z" fill="url(#d3-dark)"/>

  <!-- Layer 2 (Twilight Glow) -->
  <path d="M152 120 L328 296 L152 384 L240 296 L152 208 Z" fill="url(#d2-light)"/>
  <path d="M152 384 L328 296 L152 472 Z" fill="url(#d2-dark)"/>

  <!-- Layer 1 - Core (Twilight Primary) -->
  <path d="M88 40 L264 216 L88 304 L176 216 L88 128 Z" fill="url(#d1-light)"/>
  <path d="M88 304 L264 216 L88 392 Z" fill="url(#d1-dark)"/>

  <!-- Twilight haze shimmer accent lines -->
  <path d="M40 170 Q100 155 170 175 Q240 195 320 170 Q380 150 440 175" stroke="url(#dusk-shimmer-1)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M50 235 Q130 210 210 240 Q290 270 380 235 Q440 210 490 240" stroke="url(#dusk-shimmer-2)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70 300 Q150 275 240 305 Q330 335 420 300 Q470 275 500 295" stroke="url(#dusk-shimmer-3)" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
