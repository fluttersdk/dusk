name: Feature Request
description: Suggest a new feature or enhancement for fluttersdk_dusk
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for dusk? We'd love to hear it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement would you like to see?
      placeholder: A clear description of the feature and why it's needed.
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Which part of the framework does this relate to?
      options:
        - Extensions (ext.dusk.* handlers)
        - Commands (dusk:* CLI)
        - Actionability gate (5-gate, error envelope)
        - RefRegistry (e<N> / q<N> tokens)
        - Snapshot enrichers (DuskSnapshotEnricher)
        - CDP driver (cdp_client, device_presets, chrome_finder)
        - MCP tools (DuskArtisanProvider mcpTools)
        - Plugin integration (Magic / Wind)
        - Doctor / Doctor checks
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: api-syntax
    attributes:
      label: Proposed API
      description: How would the API look? Show the CLI invocation or Dart code shape.
      placeholder: |
        # CLI example
        dart run fluttersdk_dusk dusk:tap --ref=e1 --double

        # Dart enricher example
        DuskPlugin.registerEnricher((element, refs) => 'custom: value');
      render: yaml

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a real scenario where you'd use this feature.
      placeholder: "When automating a form submission that requires a double-tap gesture..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: code
    attributes:
      label: Example Implementation
      description: How would this look in a real consumer app or enricher?
      render: dart
